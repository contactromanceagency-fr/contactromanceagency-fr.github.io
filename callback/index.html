<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connected - Romance Content Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0e0e12;
      color: #f2f2f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .box { max-width: 480px; padding: 40px 30px; }
    .check {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      border-radius: 50%;
      background: #1db954;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
    }
    h1 { font-size: 1.7rem; margin-bottom: 14px; }
    p { color: #b9b9c4; margin-bottom: 26px; }
    a.btn {
      display: inline-block;
      background: #ff3b5c; color: #fff;
      text-decoration: none; font-weight: 600;
      padding: 13px 28px; border-radius: 10px;
    }
    .err .check { background: #e62e4d; }
  </style>
</head>
<body>
  <div class="box" id="box">
    <div class="check">&#10003;</div>
    <h1>Your TikTok account is connected</h1>
    <p>Authorization was successful. You can now publish and schedule videos to this account from Romance Content Studio.</p>
    <a class="btn" href="/">Back to home</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      const box = document.getElementById('box');
      box.classList.add('err');
      box.querySelector('.check').innerHTML = '&times;';
      box.querySelector('h1').textContent = 'Authorization was cancelled';
      box.querySelector('p').textContent = 'The connection was not completed. You can return home and try again.';
    }
  </script>
</body>
</html>
